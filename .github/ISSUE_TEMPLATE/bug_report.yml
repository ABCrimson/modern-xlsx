name: Bug Report
description: Report a bug in modern-xlsx
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the details below.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
      placeholder: |
        When I try to read a file with merged cells, the cell values are missing...
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Minimal code to reproduce the issue.
      render: typescript
      placeholder: |
        import { initWasm, readFile } from 'modern-xlsx';
        await initWasm();
        const wb = await readFile('test.xlsx');
        // ...
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: "modern-xlsx version (run: npm ls modern-xlsx)"
      placeholder: "0.3.0"
    validations:
      required: true

  - type: dropdown
    id: runtime
    attributes:
      label: Runtime
      options:
        - Node.js
        - Bun
        - Deno
        - Browser (Chrome)
        - Browser (Firefox)
        - Browser (Safari)
        - Cloudflare Workers
        - Service Worker
        - Other
    validations:
      required: true

  - type: input
    id: runtime-version
    attributes:
      label: Runtime Version
      placeholder: "Node.js 25.0.0"

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "Windows 11 / macOS 15 / Ubuntu 24.04"
