name: CI

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@beta
        with:
          components: clippy
          targets: wasm32-unknown-unknown

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test -p modern-xlsx-core

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@beta

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Cargo Audit
        run: cargo audit

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "25"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: npm audit
        run: cd packages/modern-xlsx && npm audit --omit=dev || true

  typescript:
    name: TypeScript (Node ${{ matrix.node-version }}, ${{ matrix.os }})
    needs: rust
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        node-version: ["24", "25"]
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@beta
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install wasm-pack (Linux)
        if: runner.os == 'Linux'
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Install wasm-pack (Windows)
        if: runner.os == 'Windows'
        run: cargo install wasm-pack

      - name: Cache WASM artifact
        id: cache-wasm
        uses: actions/cache@v5
        with:
          path: packages/modern-xlsx/wasm/
          key: ${{ runner.os }}-wasm-${{ hashFiles('crates/**/*.rs', 'Cargo.lock') }}
          restore-keys: ${{ runner.os }}-wasm-

      - name: Build WASM
        if: steps.cache-wasm.outputs.cache-hit != 'true'
        run: wasm-pack build crates/modern-xlsx-wasm --target web --release --out-dir ../../packages/modern-xlsx/wasm --no-opt

      - name: Track WASM size
        run: |
          WASM_SIZE=$(stat -c%s packages/modern-xlsx/wasm/modern_xlsx_wasm_bg.wasm)
          echo "WASM binary size: ${WASM_SIZE} bytes ($(( WASM_SIZE / 1024 )) KB)"
          if [ "$WASM_SIZE" -gt 2097152 ]; then
            echo "::warning::WASM binary exceeds 2 MB threshold (${WASM_SIZE} bytes)"
          fi
        shell: bash

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "${{ matrix.node-version }}"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm -C packages/modern-xlsx typecheck

      - name: Lint
        run: pnpm -C packages/modern-xlsx lint

      - name: Test
        run: pnpm -C packages/modern-xlsx test

      - name: Build
        run: pnpm -C packages/modern-xlsx build

  publish:
    name: Publish to npm
    needs: [rust, typescript]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@beta
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build WASM
        run: wasm-pack build crates/modern-xlsx-wasm --target web --release --out-dir ../../packages/modern-xlsx/wasm --no-opt

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "25"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm -C packages/modern-xlsx build

      - name: Publish
        run: cd packages/modern-xlsx && npm publish --provenance --access public
